context: |
  eShell is a local-first desktop operations workbench built with Tauri 2, React 19,
  Vite 7, Tailwind CSS 4, and a Rust backend.
  Core workflows include SSH sessions, PTY terminal I/O, SFTP file operations,
  server status monitoring, script execution, and Ops Agent chat/approval flows.
  Frontend code lives under src/, backend Tauri/Rust code lives under src-tauri/src/.
  User-facing frontend copy should go through src/lib/i18n.js for en-US and zh-CN.
  Prefer focused specs that preserve local-first desktop behavior and explicit
  approval flows for risky operations.

