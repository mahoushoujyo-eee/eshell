openapi: 3.0.3
info:
  title: eShell Tauri RPC API
  version: 0.2.0
  description: |
    OpenAPI-style docs for Tauri invoke commands.
    These are logical RPC mappings for desktop integration, not public HTTP routes.
servers:
  - url: tauri://localhost
tags:
  - name: ssh
  - name: shell
  - name: pty
  - name: sftp
  - name: status
  - name: scripts
  - name: ai
  - name: ops-agent
x-tauri-events:
  pty-output:
    payloadSchema: { $ref: "#/components/schemas/PtyOutputEvent" }
  sftp-transfer:
    payloadSchema: { $ref: "#/components/schemas/SftpTransferEvent" }
  ops-agent-stream:
    payloadSchema: { $ref: "#/components/schemas/OpsAgentStreamEvent" }
paths:
  /rpc/list_ssh_configs:
    post:
      tags: [ssh]
      summary: List SSH configs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/SshConfig" }
  /rpc/save_ssh_config:
    post:
      tags: [ssh]
      summary: Create or update SSH config
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SshConfigRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SshConfig" }
  /rpc/delete_ssh_config:
    post:
      tags: [ssh]
      summary: Delete SSH config
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IdRequest" }
      responses:
        "200": { description: OK (null) }

  /rpc/list_shell_sessions:
    post:
      tags: [shell]
      summary: List active shell sessions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ShellSession" }
  /rpc/open_shell_session:
    post:
      tags: [shell]
      summary: Open shell session
      description: Opens a shell session. Optional requestId allows cancelling the pending TCP connection phase.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpenShellRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShellSession" }
  /rpc/cancel_open_shell_session:
    post:
      tags: [shell]
      summary: Cancel pending shell connection attempt
      description: Marks a pending open_shell_session requestId as cancelled. Cancellation is checked during TCP connection.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CancelShellConnectionRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: boolean }
  /rpc/close_shell_session:
    post:
      tags: [shell]
      summary: Close shell session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CloseShellRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/pty_write_input:
    post:
      tags: [pty]
      summary: Write PTY input
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PtyWriteRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/pty_resize:
    post:
      tags: [pty]
      summary: Resize PTY
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PtyResizeRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/execute_shell_command:
    post:
      tags: [shell]
      summary: Execute shell command
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExecuteCommandRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommandExecutionResult" }

  /rpc/sftp_list_dir:
    post:
      tags: [sftp]
      summary: List SFTP directory
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpListRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SftpListResponse" }
  /rpc/sftp_read_file:
    post:
      tags: [sftp]
      summary: Read SFTP file
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpReadRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SftpFileContent" }
  /rpc/sftp_write_file:
    post:
      tags: [sftp]
      summary: Write SFTP file
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpWriteRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/sftp_create_file:
    post:
      tags: [sftp]
      summary: Create empty SFTP file
      description: Creates an empty remote file and rejects existing target paths.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpCreateRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/sftp_create_directory:
    post:
      tags: [sftp]
      summary: Create SFTP directory
      description: Creates one remote directory and rejects existing target paths.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpCreateRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/sftp_upload_file:
    post:
      tags: [sftp]
      summary: Upload file (legacy base64)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpUploadRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/sftp_delete_entry:
    post:
      tags: [sftp]
      summary: Delete remote file, directory, or symlink
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpDeleteEntryRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/sftp_upload_file_with_progress:
    post:
      tags: [sftp]
      summary: Upload file with progress events
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpUploadWithProgressRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SftpTransferResult" }
  /rpc/sftp_download_file:
    post:
      tags: [sftp]
      summary: Download file (legacy base64 payload)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpDownloadRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SftpDownloadPayload" }
  /rpc/sftp_download_file_to_local:
    post:
      tags: [sftp]
      summary: Download file to local path with progress
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpDownloadToLocalRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SftpTransferResult" }
  /rpc/sftp_default_download_dir:
    post:
      tags: [sftp]
      summary: Get default local download dir
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: string }
  /rpc/sftp_cancel_transfer:
    post:
      tags: [sftp]
      summary: Cancel transfer by transferId
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SftpCancelTransferRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: boolean }

  /rpc/fetch_server_status:
    post:
      tags: [status]
      summary: Fetch live server status
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FetchServerStatusRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerStatus" }
  /rpc/get_cached_server_status:
    post:
      tags: [status]
      summary: Get cached status by sessionId
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SessionIdRequest" }
      responses:
        "200":
          description: OK (nullable ServerStatus)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ServerStatus"
                nullable: true

  /rpc/list_scripts:
    post:
      tags: [scripts]
      summary: List scripts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScriptDefinition" }
  /rpc/save_script:
    post:
      tags: [scripts]
      summary: Create or update script
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ScriptRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScriptDefinition" }
  /rpc/delete_script:
    post:
      tags: [scripts]
      summary: Delete script
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IdRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/run_script:
    post:
      tags: [scripts]
      summary: Run script in session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunScriptRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunScriptResult" }

  /rpc/get_ai_config:
    post:
      tags: [ai]
      summary: Get AI config (legacy)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiConfig" }
  /rpc/save_ai_config:
    post:
      tags: [ai]
      summary: Save AI config (legacy)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiConfigRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiConfig" }
  /rpc/list_ai_profiles:
    post:
      tags: [ai]
      summary: List AI profiles
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiProfilesState" }
  /rpc/save_ai_profile:
    post:
      tags: [ai]
      summary: Save AI profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiProfileRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiProfilesState" }
  /rpc/delete_ai_profile:
    post:
      tags: [ai]
      summary: Delete AI profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IdRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiProfilesState" }
  /rpc/set_active_ai_profile:
    post:
      tags: [ai]
      summary: Set active AI profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetActiveAiProfileRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiProfilesState" }
  /rpc/ai_ask:
    post:
      tags: [ai]
      summary: Ask AI (non-stream endpoint)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiAskRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiAnswer" }

  /rpc/ops_agent_list_conversations:
    post:
      tags: [ops-agent]
      summary: List Ops Agent conversations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OpsAgentConversationSummary" }
  /rpc/ops_agent_create_conversation:
    post:
      tags: [ops-agent]
      summary: Create Ops Agent conversation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentCreateConversationRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsAgentConversation" }
  /rpc/ops_agent_get_conversation:
    post:
      tags: [ops-agent]
      summary: Get Ops Agent conversation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentConversationRefRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsAgentConversation" }
  /rpc/ops_agent_get_attachment_content:
    post:
      tags: [ops-agent]
      summary: Get stored Ops Agent image attachment content
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentAttachmentRefRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsAgentAttachmentContent" }
  /rpc/ops_agent_delete_conversation:
    post:
      tags: [ops-agent]
      summary: Delete Ops Agent conversation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentConversationRefRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/ops_agent_set_active_conversation:
    post:
      tags: [ops-agent]
      summary: Set active Ops Agent conversation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentConversationRefRequest" }
      responses:
        "200": { description: OK (null) }
  /rpc/ops_agent_compact_conversation:
    post:
      tags: [ops-agent]
      summary: Compact Ops Agent conversation history
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentCompactConversationRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsAgentCompactConversationResult" }
  /rpc/ops_agent_chat_stream_start:
    post:
      tags: [ops-agent]
      summary: Start Ops Agent stream
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentChatRequest" }
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsAgentChatAccepted" }
  /rpc/ops_agent_list_pending_actions:
    post:
      tags: [ops-agent]
      summary: List pending actions
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentListPendingActionsRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OpsAgentPendingAction" }
  /rpc/ops_agent_resolve_action:
    post:
      tags: [ops-agent]
      summary: Approve or reject pending action
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentResolveActionRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsAgentResolveActionResult" }
  /rpc/ops_agent_cancel_run:
    post:
      tags: [ops-agent]
      summary: Cancel stream run
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OpsAgentCancelRunRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OpsAgentCancelRunResult" }

components:
  schemas:
    IdRequest:
      type: object
      required: [id]
      properties: { id: { type: string } }
    SessionIdRequest:
      type: object
      required: [sessionId]
      properties: { sessionId: { type: string } }

    SshConfigRequest:
      type: object
      required: [input]
      properties:
        input:
          type: object
          required: [name, host, port, username, password]
          properties:
            id: { type: string, nullable: true }
            name: { type: string }
            host: { type: string }
            port: { type: integer }
            username: { type: string }
            password: { type: string }
            description: { type: string, nullable: true }
    SshConfig:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        password: { type: string }
        description: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    OpenShellRequest:
      type: object
      properties:
        input:
          type: object
          required: [configId]
          properties:
            configId: { type: string }
            requestId: { type: string, nullable: true }
    CancelShellConnectionRequest:
      type: object
      properties:
        input:
          type: object
          required: [requestId]
          properties:
            requestId: { type: string }
    CloseShellRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId]
          properties: { sessionId: { type: string } }
    PtyWriteRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, data]
          properties:
            sessionId: { type: string }
            data: { type: string }
    PtyResizeRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, cols, rows]
          properties:
            sessionId: { type: string }
            cols: { type: integer }
            rows: { type: integer }
    ExecuteCommandRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, command]
          properties:
            sessionId: { type: string }
            command: { type: string }
    ShellSession:
      type: object
      additionalProperties: true
      description: Shell session DTO with ids, directory, output cache, timestamps.
    CommandExecutionResult:
      type: object
      additionalProperties: true

    SftpListRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, path]
          properties:
            sessionId: { type: string }
            path: { type: string }
    SftpReadRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, path]
          properties:
            sessionId: { type: string }
            path: { type: string }
    SftpWriteRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, path, content]
          properties:
            sessionId: { type: string }
            path: { type: string }
            content: { type: string }
    SftpCreateRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, path]
          properties:
            sessionId: { type: string }
            path: { type: string }
    SftpUploadRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, remotePath, contentBase64]
          properties:
            sessionId: { type: string }
            remotePath: { type: string }
            contentBase64: { type: string }
    SftpDeleteEntryRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, path, entryType]
          properties:
            sessionId: { type: string }
            path: { type: string }
            entryType: { type: string }
    SftpUploadWithProgressRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, remotePath, contentBase64, transferId]
          properties:
            sessionId: { type: string }
            remotePath: { type: string }
            contentBase64: { type: string }
            transferId: { type: string }
            localName: { type: string, nullable: true }
    SftpDownloadRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, remotePath]
          properties:
            sessionId: { type: string }
            remotePath: { type: string }
    SftpDownloadToLocalRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId, remotePath, localDir, transferId]
          properties:
            sessionId: { type: string }
            remotePath: { type: string }
            localDir: { type: string }
            transferId: { type: string }
    SftpCancelTransferRequest:
      type: object
      properties:
        input:
          type: object
          required: [transferId]
          properties: { transferId: { type: string } }
    SftpListResponse:
      type: object
      additionalProperties: true
    SftpFileContent:
      type: object
      properties:
        path: { type: string }
        content: { type: string }
    SftpDownloadPayload:
      type: object
      additionalProperties: true
    SftpTransferResult:
      type: object
      additionalProperties: true
    SftpTransferEvent:
      type: object
      additionalProperties: true
      description: stage is one of started/progress/completed/failed/cancelled.

    FetchServerStatusRequest:
      type: object
      properties:
        input:
          type: object
          required: [sessionId]
          properties:
            sessionId: { type: string }
            selectedInterface: { type: string, nullable: true }
    MemoryStatus:
      type: object
      required: [usedMb, totalMb, usedPercent]
      properties:
        usedMb: { type: number }
        totalMb: { type: number }
        usedPercent: { type: number }
    NetworkInterfaceStatus:
      type: object
      required: [interface, rxBytes, txBytes]
      properties:
        interface: { type: string }
        rxBytes: { type: integer, format: int64 }
        txBytes: { type: integer, format: int64 }
    ProcessStatus:
      type: object
      required: [pid, cpuPercent, memoryMb, command]
      properties:
        pid: { type: integer }
        cpuPercent: { type: number }
        memoryMb: { type: number }
        command: { type: string }
    DiskStatus:
      type: object
      required: [filesystem, mountPoint, used, total, usedPercent]
      properties:
        filesystem: { type: string }
        mountPoint: { type: string }
        used: { type: string }
        total: { type: string }
        usedPercent: { type: string }
    ServerStatus:
      type: object
      required:
        [cpuPercent, memory, networkInterfaces, topProcesses, disks, fetchedAt]
      properties:
        cpuPercent: { type: number }
        memory: { $ref: "#/components/schemas/MemoryStatus" }
        networkInterfaces:
          type: array
          items: { $ref: "#/components/schemas/NetworkInterfaceStatus" }
        selectedInterface: { type: string, nullable: true }
        selectedInterfaceTraffic:
          allOf:
            - $ref: "#/components/schemas/NetworkInterfaceStatus"
          nullable: true
        topProcesses:
          type: array
          items: { $ref: "#/components/schemas/ProcessStatus" }
        disks:
          type: array
          items: { $ref: "#/components/schemas/DiskStatus" }
        fetchedAt: { type: string }

    ScriptRequest:
      type: object
      properties:
        input:
          type: object
